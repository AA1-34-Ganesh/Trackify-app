<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <link rel="stylesheet" href="../CSS/money-tracker.css">
</head>
<body>
    <div class="page-container">
        <nav>
            <div class="logo">
                <h1><a href="index.html">Track</a></h1>
            </div>
            <ul class="main-nav">
                <li><a class="link" href="./index.html">Home</a></li>
            </ul>
        </nav>
            <section class="input-section">
                <h1>Money Track Web</h1>
              
                <input type="text" placeholder="Enter the category name" id="category-select"/>
                <input type="number" id="amount-input" placeholder="Enter the amount">
                <input type="date" id="date-input">
               
                <button id="add-btn">Add</button>
            </section>     
                <section class="expenses-list">
                    <h2>Expenses List</h2>
                    <table border="1">
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody id="expense-table-body">
                        </tbody>
                        <tfoot>
                            <tr>
                                <td>Total:</td>
                                <td id="total-amount">0</td>
                                <td></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </section>
        </div>
    <script src="../JS/script.js"></script>
</body>
</html>
